<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HUB | The Nest</title>
  <link rel="stylesheet" href="./css/hub.css">
  <link rel="stylesheet" href="./css/dev-mode.css">
</head>
<body>
  <main class="hub-page nest-art-page" aria-label="The Nest HUB page">
    <img class="hub-bg" src="./assets/backgrounds/hub-bg.png" alt="The Nest HUB interface">

    <!-- Live Nest Sync text overlay. The background contains the panel artwork; this gives us data-ready text for later. -->
    <section class="nest-sync-card" aria-label="Nest Sync status">
      <div class="sync-title">Nest Sync</div>
      <div id="nest-sync-status" class="sync-status is-connected">Connected</div>
      <div id="nest-sync-updated" class="sync-updated">Last updated just now</div>
    </section>

    <div class="kiwi-reaction" aria-hidden="true"></div>

    <!-- Invisible click zones over the artwork buttons. Press F8 to align them in Developer Mode. -->
    <a class="hotspot hotspot-twitch" href="twitch.html" aria-label="Open Twitch page" data-dev-label="TWITCH" data-kiwi-reaction="Watching the stream room."></a>
    <a class="hotspot hotspot-discord" href="discord.html" aria-label="Open Discord page" data-dev-label="DISCORD" data-kiwi-reaction="Join the flock."></a>
    <a class="hotspot hotspot-community" href="community.html" aria-label="Open Community" data-dev-label="COMMUNITY" data-kiwi-reaction="The flock is home."></a>
    <a class="hotspot hotspot-events" href="events.html" aria-label="Open Events" data-dev-label="EVENTS" data-kiwi-reaction="Something is coming up."></a>
    <a class="hotspot hotspot-shop" href="shop.html" aria-label="Open The Nest Shop" data-dev-label="SHOP" data-kiwi-reaction="Shinies accepted here."></a>
    <a class="hotspot hotspot-my-nest" href="my-nest.html" aria-label="Open My Nest" data-dev-label="MY NEST" data-kiwi-reaction="Your home in The Nest."></a>
  </main>

  <script src="./js/hub.js"></script>
  <script src="./js/dev-mode.js"></script>
</body>
</html>
