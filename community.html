<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Community | The Nest</title>
  <link rel="stylesheet" href="./css/community.css">
  <link rel="stylesheet" href="./css/community-highlights.css">
  <link rel="stylesheet" href="./css/community-leaderboard.css">
  <link rel="stylesheet" href="./css/community-activity.css">
  <link rel="stylesheet" href="./css/dev-mode.css">
</head>
<body>
  <main class="community-page nest-art-page" aria-label="The Nest Community page">
    <img class="community-bg" src="./assets/backgrounds/community-bg.png?v=community-final-20260708" alt="The Nest Community interface">

    <nav aria-label="Community page navigation">
      <a class="hotspot nav-hotspot nav-hub" href="hub.html" aria-label="Open Hub" data-dev-label="NAV HUB"></a>
      <a class="hotspot nav-hotspot nav-twitch" href="twitch.html" aria-label="Open Twitch page" data-dev-label="NAV TWITCH"></a>
      <a class="hotspot nav-hotspot nav-discord" href="discord.html" aria-label="Open Discord page" data-dev-label="NAV DISCORD"></a>
      <a class="hotspot nav-hotspot nav-community is-current" href="community.html" aria-label="Community current page" data-dev-label="NAV COMMUNITY"></a>
      <a class="hotspot nav-hotspot nav-events" href="events.html" aria-label="Open Events" data-dev-label="NAV EVENTS"></a>
      <a class="hotspot nav-hotspot nav-shop" href="shop.html" aria-label="Open The Nest Shop" data-dev-label="NAV SHOP"></a>
    </nav>

    <section class="community-panel highlights-panel" aria-label="Community highlights">
      <div id="community-highlights" class="community-list highlights-list"></div>
    </section>

    <section class="community-panel leaderboard-panel" aria-label="Top Shiny earners">
      <div id="community-leaderboard" class="leaderboard-list"></div>
      <a class="panel-cta leaderboard-cta" href="leaderboards.html">View Leaderboard <span>›</span></a>
    </section>

    <section class="community-panel activity-panel" aria-label="Recent activity">
      <div id="community-activity" class="activity-list" aria-live="polite"></div>
      <a class="panel-cta activity-cta" href="events.html">View All Activity <span>›</span></a>
    </section>

    <section class="community-panel goal-panel" aria-label="Community goal">
      <div class="goal-copy" id="community-goal-copy"></div>
      <div class="goal-bar" aria-hidden="true"><span id="community-goal-bar"></span></div>
      <div class="goal-meta" id="community-goal-meta"></div>
    </section>

    <section class="nest-sync-card" aria-label="Nest Sync status">
      <div id="nest-sync-status" class="sync-status is-connected">Connected</div>
      <div id="nest-sync-updated" class="sync-updated">Last updated just now</div>
    </section>
  </main>

  <script src="./js/community.js"></script>
  <script src="./js/dev-mode.js"></script>
</body>
</html>
