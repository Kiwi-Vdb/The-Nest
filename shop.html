<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Nest Shop | The Nest</title>
  <link rel="stylesheet" href="./css/my-nest-nav.css">
  <link rel="stylesheet" href="./css/shop.css">
  <link rel="stylesheet" href="./css/shop-live.css">
  <link rel="stylesheet" href="./css/shop-catalogue.css">
  <link rel="stylesheet" href="./css/dev-mode.css">
</head>
<body>
  <main class="shop-page nest-art-page" aria-label="The Nest Shop page">
    <img class="shop-bg" src="./assets/backgrounds/shop-bg.png?v=shop-approved-20260708" alt="The Nest Shop interface">

    <nav aria-label="Shop page navigation">
      <a class="hotspot nav-hotspot nav-hub" href="hub.html" aria-label="Open Hub" data-dev-label="NAV HUB"></a>
      <a class="hotspot nav-hotspot nav-twitch" href="twitch.html" aria-label="Open Twitch page" data-dev-label="NAV TWITCH"></a>
      <a class="hotspot nav-hotspot nav-discord" href="discord.html" aria-label="Open Discord page" data-dev-label="NAV DISCORD"></a>
      <a class="hotspot nav-hotspot nav-community" href="community.html" aria-label="Open Community" data-dev-label="NAV COMMUNITY"></a>
      <a class="hotspot nav-hotspot nav-events" href="events.html" aria-label="Open Events" data-dev-label="NAV EVENTS"></a>
      <a class="hotspot nav-hotspot nav-shop is-current" href="shop.html" aria-label="The Nest Shop current page" data-dev-label="NAV SHOP"></a>
      <a class="my-nest-nav dev-editable" href="my-nest.html" aria-label="Open My Nest"
         data-dev-id="nav-my-nest" data-dev-label="NAV MY NEST" data-dev-selector=".my-nest-nav">My Nest</a>
    </nav>

    <section class="shop-balance dev-editable" data-dev-id="shop-balance" data-dev-label="SHOP ACCOUNT & BALANCE" data-dev-selector=".shop-balance" aria-label="Your Shinies balance">
      <div class="shop-balance-label">Your Shinies</div>
      <div class="shop-balance-value"><span id="shop-shinies">—</span> ✦</div>
      <div id="shop-account" class="shop-account"></div>
      <div id="shop-service-status" class="shop-service-status" role="status" aria-live="polite"></div>
    </section>

    <section class="featured-product-slot featured-product-1 dev-editable" data-dev-id="featured-product-1" data-dev-label="FEATURED PRODUCT 1" data-dev-selector=".featured-product-1" aria-label="Featured product one">
      <div data-featured-slot="0" aria-live="polite"></div>
    </section>

    <section class="featured-product-slot featured-product-2 dev-editable" data-dev-id="featured-product-2" data-dev-label="FEATURED PRODUCT 2" data-dev-selector=".featured-product-2" aria-label="Featured product two">
      <div data-featured-slot="1" aria-live="polite"></div>
    </section>

    <section class="featured-product-slot featured-product-3 dev-editable" data-dev-id="featured-product-3" data-dev-label="FEATURED PRODUCT 3" data-dev-selector=".featured-product-3" aria-label="Featured product three">
      <div data-featured-slot="2" aria-live="polite"></div>
    </section>

    <section class="featured-product-slot featured-product-4 dev-editable" data-dev-id="featured-product-4" data-dev-label="FEATURED PRODUCT 4" data-dev-selector=".featured-product-4" aria-label="Featured product four">
      <div data-featured-slot="3" aria-live="polite"></div>
    </section>

    <a class="shop-catalog-button shop-cosmetics-button dev-editable" href="cosmetics.html"
       data-dev-id="shop-cosmetics-button" data-dev-label="VIEW ALL COSMETICS BUTTON"
       data-dev-selector=".shop-cosmetics-button">View All Cosmetics</a>

    <a class="shop-catalog-button shop-text-effects-button dev-editable" href="text-effects.html"
       data-dev-id="shop-text-effects-button" data-dev-label="VIEW ALL TEXT EFFECTS BUTTON"
       data-dev-selector=".shop-text-effects-button">View All Text Effects</a>

    <section class="shop-daily dev-editable" data-dev-id="shop-daily" data-dev-label="DAILY SPECIAL" data-dev-selector=".shop-daily"
             data-dev-scale-var="--shop-panel-scale" aria-label="Daily special">
      <div class="shop-panel-content">
        <div class="panel-heading">Daily Special</div>
        <div id="shop-daily-special" class="daily-special"></div>
      </div>
    </section>

    <section class="shop-sellers dev-editable" data-dev-id="shop-sellers" data-dev-label="TOP SELLERS" data-dev-selector=".shop-sellers"
             data-dev-scale-var="--shop-panel-scale" aria-label="Top sellers">
      <div class="shop-panel-content">
        <div class="panel-heading">Top Sellers</div>
        <div id="shop-top-sellers" class="seller-list"></div>
      </div>
    </section>

    <section class="nest-sync-card dev-editable" data-dev-id="nest-sync" data-dev-label="NEST SYNC" data-dev-selector=".nest-sync-card" aria-label="Nest Sync status">
      <div id="nest-sync-status" class="sync-status is-connected">Connected</div>
      <div id="nest-sync-updated" class="sync-updated">Last updated just now</div>
    </section>

    <div id="shop-modal" class="shop-modal" hidden aria-hidden="true">
      <div class="shop-modal-backdrop" data-shop-close></div>
      <section class="shop-modal-card" role="dialog" aria-modal="true" aria-labelledby="shop-modal-title" aria-describedby="shop-modal-description">
        <button class="shop-modal-close" type="button" data-shop-close aria-label="Close purchase window">×</button>
        <div id="shop-modal-icon" class="shop-modal-icon">✦</div>
        <div id="shop-modal-rarity" class="shop-modal-rarity"></div>
        <h2 id="shop-modal-title">Confirm purchase</h2>
        <p id="shop-modal-description"></p>
        <div class="shop-modal-summary" aria-label="Purchase summary">
          <div><span>Current balance</span><strong id="shop-modal-balance">—</strong></div>
          <div><span>Item price</span><strong id="shop-modal-price">—</strong></div>
          <div><span>Balance after</span><strong id="shop-modal-after">—</strong></div>
        </div>
        <div id="shop-modal-notice" class="shop-modal-notice">The reward is reserved immediately and applied by Kiwi Birb.</div>
        <div id="shop-modal-error" class="shop-modal-error" role="status"></div>
        <div class="shop-modal-actions">
          <button type="button" class="shop-secondary-button" data-shop-close>Cancel</button>
          <button type="button" id="shop-confirm-buy" class="shop-primary-button">Buy</button>
        </div>
      </section>
    </div>

    <div id="shop-toast" class="shop-toast" role="status" aria-live="polite"></div>
  </main>

  <script src="./js/main.js"></script>
  <script src="./js/shop.js"></script>
  <script src="./js/dev-mode.js?v=20260713-f8-publish-hotfix"></script>
</body>
</html>
