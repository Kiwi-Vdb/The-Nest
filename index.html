<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome | The Nest</title>
  <link rel="stylesheet" href="./css/welcome.css">
  <link rel="stylesheet" href="./css/dev-mode.css?v=20260718-f8-editor-v2">
</head>
<body>
  <main class="welcome-page" aria-label="The Nest welcome page">
    <img class="welcome-bg" src="./assets/backgrounds/welcome-bg.png" alt="The Nest welcome interface">

    <!-- Live text overlay. Values use the Cloudflare live-status service, with a fresh GitHub snapshot fallback. -->
    <section class="stream-status-card" aria-label="Twitch stream status">
      <div id="stream-status" class="stream-status is-offline">● OFFLINE</div>
      <div id="viewer-count" class="viewer-count">0 Viewers</div>
    </section>

    <!-- Invisible click zones over the artwork buttons. Press F8 to align them in Developer Mode. -->
    <a class="hotspot hotspot-watch" href="https://www.twitch.tv/itsvdb" target="_blank" rel="noopener noreferrer" aria-label="Watch ItsVdb on Twitch" data-dev-label="WATCH"></a>
    <a class="hotspot hotspot-discord" href="https://discord.gg/KGE8Q6GW6a" target="_blank" rel="noopener noreferrer" aria-label="Join The Nest Discord" data-dev-label="DISCORD"></a>
    <a class="hotspot hotspot-hub" href="hub.html" aria-label="Enter the Hub" data-dev-label="ENTER HUB"></a>
  </main>

  <script src="./js/welcome.js?v=20260713-cloud-status"></script>
  <script src="./js/dev-mode.js?v=20260718-f8-editor-v2"></script>
</body>
</html>
