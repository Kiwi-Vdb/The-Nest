<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord | The Nest</title>
  <link rel="stylesheet" href="./css/my-nest-nav.css">
  <link rel="stylesheet" href="./css/discord.css?v=discord-live-v366">
  <link rel="stylesheet" href="./css/dev-mode.css">
</head>
<body>
  <main class="discord-page nest-art-page" aria-label="The Nest Discord page">
    <img class="discord-bg" src="./assets/backgrounds/discord-bg.png?v=discord-live-chat-20260712" alt="The Nest Discord room interface">

    <nav aria-label="Discord page navigation">
      <a class="hotspot nav-hotspot nav-hub" href="hub.html" aria-label="Open Hub" data-dev-id="nav-hub" data-dev-label="NAV HUB" data-dev-selector=".nav-hub"></a>
      <a class="hotspot nav-hotspot nav-twitch" href="twitch.html" aria-label="Open Twitch page" data-dev-id="nav-twitch" data-dev-label="NAV TWITCH" data-dev-selector=".nav-twitch"></a>
      <a class="hotspot nav-hotspot nav-discord is-current" href="discord.html" aria-label="Discord current page" data-dev-id="nav-discord" data-dev-label="NAV DISCORD" data-dev-selector=".nav-discord"></a>
      <a class="hotspot nav-hotspot nav-community" href="community.html" aria-label="Open Community" data-dev-id="nav-community" data-dev-label="NAV COMMUNITY" data-dev-selector=".nav-community"></a>
      <a class="hotspot nav-hotspot nav-events" href="events.html" aria-label="Open Events" data-dev-id="nav-events" data-dev-label="NAV EVENTS" data-dev-selector=".nav-events"></a>
      <a class="hotspot nav-hotspot nav-shop" href="shop.html" aria-label="Open The Nest Shop" data-dev-id="nav-shop" data-dev-label="NAV SHOP" data-dev-selector=".nav-shop"></a>
      <a class="my-nest-nav dev-editable" href="my-nest.html" aria-label="Open My Nest"
         data-dev-id="nav-my-nest" data-dev-label="NAV MY NEST" data-dev-selector=".my-nest-nav">My Nest</a>
    </nav>

    <a
      id="discord-join-link"
      class="hotspot join-discord-hotspot"
      href="https://discord.gg/KGE8Q6GW6a"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Join The Nest Discord server"
      data-dev-id="join-discord-button"
      data-dev-label="JOIN DISCORD BUTTON"
      data-dev-selector=".join-discord-hotspot"
    ></a>

    <section
      class="discord-panel members-online-panel dev-editable"
      aria-label="Members online"
      data-dev-id="members-online-panel"
      data-dev-label="MEMBERS ONLINE PANEL"
      data-dev-selector=".members-online-panel"
    >
      <div id="discord-members" class="members-online-content" aria-live="polite">
        <div class="discord-loading-state">Connecting to the flock…</div>
      </div>
    </section>

    <section
      class="discord-panel live-chat-panel dev-editable"
      aria-label="Live general chat"
      data-dev-id="live-general-chat-panel"
      data-dev-label="LIVE GENERAL CHAT PANEL"
      data-dev-selector=".live-chat-panel"
    >
      <div id="discord-general-chat" class="discord-chat-list" aria-live="polite">
        <div class="discord-loading-state">Waiting for Discord chat…</div>
      </div>
    </section>

    <section
      class="discord-panel latest-meme-panel dev-editable"
      aria-label="Latest meme"
      data-dev-id="latest-meme-panel"
      data-dev-label="LATEST MEME PANEL"
      data-dev-selector=".latest-meme-panel"
    >
      <div id="discord-latest-meme" class="latest-meme-content" aria-live="polite">
        <div class="discord-loading-state">Waiting for the latest meme…</div>
      </div>
    </section>

    <section
      class="nest-sync-card dev-editable"
      aria-label="Nest Sync status"
      data-dev-id="discord-nest-sync"
      data-dev-label="NEST SYNC STATUS"
      data-dev-selector=".nest-sync-card"
    >
      <div id="nest-sync-status" class="sync-status is-connected">Connected</div>
      <div id="nest-sync-updated" class="sync-updated">Last updated just now</div>
    </section>
  </main>

  <div id="discord-meme-modal" class="discord-meme-modal" hidden role="dialog" aria-modal="true" aria-labelledby="discord-meme-modal-caption">
    <div class="discord-meme-dialog">
      <button id="discord-meme-modal-close" class="discord-meme-modal-close" type="button" aria-label="Close meme preview">×</button>
      <img id="discord-meme-modal-image" class="discord-meme-modal-image" alt="">
      <div class="discord-meme-modal-details">
        <div>
          <div id="discord-meme-modal-caption" class="discord-meme-modal-caption">Latest meme</div>
          <div id="discord-meme-modal-author" class="discord-meme-modal-author"></div>
        </div>
        <a id="discord-meme-modal-link" class="discord-meme-modal-link" href="#" target="_blank" rel="noopener noreferrer">OPEN IN DISCORD</a>
      </div>
    </div>
  </div>

  <script src="./js/discord.js?v=discord-live-v366"></script>
  <script src="./js/dev-mode.js"></script>
</body>
</html>
