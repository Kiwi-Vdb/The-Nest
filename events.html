<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events | The Nest</title>
  <link rel="stylesheet" href="./css/events.css">
  <link rel="stylesheet" href="./css/dev-mode.css">
</head>
<body>
  <main class="events-page nest-art-page" aria-label="The Nest Events page">
    <img class="events-bg" src="./assets/backgrounds/events-bg-20260709-final.png" alt="The Nest Events room interface">

    <nav aria-label="Events page navigation">
      <a class="hotspot nav-hotspot nav-hub" href="hub.html" aria-label="Open Hub" data-dev-label="NAV HUB"></a>
      <a class="hotspot nav-hotspot nav-twitch" href="twitch.html" aria-label="Open Twitch page" data-dev-label="NAV TWITCH"></a>
      <a class="hotspot nav-hotspot nav-discord" href="discord.html" aria-label="Open Discord page" data-dev-label="NAV DISCORD"></a>
      <a class="hotspot nav-hotspot nav-community" href="community.html" aria-label="Open Community" data-dev-label="NAV COMMUNITY"></a>
      <a class="hotspot nav-hotspot nav-events is-current" href="events.html" aria-label="Events current page" data-dev-label="NAV EVENTS"></a>
      <a class="hotspot nav-hotspot nav-shop" href="shop.html" aria-label="Open The Nest Shop" data-dev-label="NAV SHOP"></a>
    </nav>

    <section class="events-upcoming dev-editable" data-dev-id="events-upcoming" aria-label="Upcoming events">
      <div id="events-upcoming-list" class="event-list"></div>
    </section>

    <section class="events-current dev-editable" data-dev-id="events-current" aria-label="Current event">
      <div id="events-current-card" class="current-event"></div>
    </section>

    <section class="events-calendar dev-editable" data-dev-id="events-calendar" aria-label="Events calendar">
      <div id="events-calendar-list" class="calendar-list"></div>
    </section>
  </main>

  <script src="./js/main.js"></script>
  <script src="./js/events.js"></script>
  <script src="./js/dev-mode.js"></script>
</body>
</html>
